<ion-app>
  <ion-split-pane contentId="main-content" [when]="isAuthenticated ? 'md' : false">
    <ion-menu contentId="main-content" type="overlay" *ngIf="isAuthenticated">
      <ion-content>
        <!-- Branding -->
        <div class="sidebar-brand">
          <div class="brand-logo">
            <ion-icon name="water"></ion-icon>
          </div>
          <div class="brand-text">
            <span class="brand-name">AquaSense</span>
            <span class="brand-tagline">IoT Water Monitor</span>
          </div>
        </div>

        <!-- User Profile -->
        <div class="sidebar-user" *ngIf="user">
          <div class="user-avatar">{{ user.name?.charAt(0)?.toUpperCase() }}</div>
          <div class="user-info">
            <span class="user-name">{{ user.name }}</span>
            <span class="user-role" [attr.data-role]="roleColor">{{ roleBadge }}</span>
          </div>
        </div>

        <!-- Navigation -->
        <ion-list id="nav-list" lines="none">
          <!-- Main Static Pages -->
          @for (p of appPages; track p; let i = $index) {
            <ion-menu-toggle auto-hide="false">
              <ion-item routerDirection="root" [routerLink]="[p.url]" detail="false" routerLinkActive="selected">
                <ion-icon aria-hidden="true" slot="start" [ios]="p.icon + '-outline'" [md]="p.icon + '-sharp'"></ion-icon>
                <ion-label>{{ p.title }}</ion-label>
              </ion-item>
            </ion-menu-toggle>
          }
        </ion-list>

        <!-- Logout & Dev Tools -->
        <div class="sidebar-footer">
          <ion-item *ngIf="user?.role === 'admin'" lines="none" detail="false" (click)="seedDemoData()" button style="--color: #10b981; margin-bottom: 8px;">
            <ion-icon name="cloud-upload-outline" slot="start"></ion-icon>
            <ion-label>Seed Demo Data</ion-label>
          </ion-item>
          <ion-item lines="none" detail="false" (click)="logout()" button>
            <ion-icon name="log-out-outline" slot="start"></ion-icon>
            <ion-label>Sign Out</ion-label>
          </ion-item>
        </div>
      </ion-content>
    </ion-menu>
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
